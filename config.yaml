sources:
  - path: ./src/guides
    type: documento
    description: Documentos técnicos

db_path: ./chroma_db
collection_name: documents

embedding:
    provider: huggingface
    model: paraphrase-multilingual-MiniLM-L12-v2

search:
    top_k: 5
    hybrid: true
    cache_max_size: 200
    cache_ttl: 3600

chunking:
    max_size: 1000
    overlap: 200
